kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-maven-local
  namespace: customers-{{ .Values.lab.username }}
  finalizers:
    - kubernetes.io/pvc-protection
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ocs-external-storagecluster-ceph-rbd
  volumeMode: Filesystem
